ai_usage_summary: |
Used ChatGPT and Claude for architecture discussion, debugging,
code review, repository cleanup, reasoning generation, and
documentation. Antigravity IDE was used for development assistance
and code editing. Final implementation, testing, validation,
and submission generation were performed by the team.

methodology_summary: |
TalentDNA AI combines semantic retrieval, role intelligence,
evidence matching, recruiter behavior signals, career-history
analysis, and integrity validation. Candidate embeddings are
generated using BGE embeddings and indexed with FAISS. Retrieved
candidates are scored using semantic relevance, role alignment,
technical evidence, recruiter signals, experience fit, location
fit, freshness, and integrity penalties. The final system is
fully CPU-based, deterministic, explainable, and generates
candidate-level reasoning for every ranked recommendation.

