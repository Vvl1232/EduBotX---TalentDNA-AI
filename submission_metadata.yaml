ai_usage_summary: |
Used ChatGPT and Claude for architecture discussions, debugging,
code review, repository cleanup, reasoning generation, and
documentation. Antigravity IDE was used for development assistance
and code editing. Final implementation, testing, validation,
optimization, and submission generation were performed by the team.

methodology_summary: |
TalentDNA AI combines semantic retrieval, role intelligence,
evidence matching, recruiter behavior signals, career-history
analysis, and integrity validation.

Candidate embeddings are generated using BGE embeddings and
indexed with FAISS. The system performs retrieval-first ranking:
the full 100,000-candidate pool is searched using FAISS, relevant
candidates are retrieved, and detailed feature extraction and
scoring are performed only on the retrieved subset.

Candidates are evaluated using semantic relevance, role alignment,
technical evidence, recruiter signals, experience fit, location
fit, freshness, and integrity penalties.

The final system is fully CPU-based, deterministic, explainable,
memory-efficient, and generates candidate-level reasoning for
every ranked recommendation.

